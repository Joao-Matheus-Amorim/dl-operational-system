name: Daily Meta Ads Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run agent
        run: npm start
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_API_VERSION: ${{ secrets.META_API_VERSION }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          SPREADSHEET_ID_TIAGO: ${{ secrets.SPREADSHEET_ID_TIAGO }}
          OTICA1_AD_ACCOUNT_ID: ${{ secrets.OTICA1_AD_ACCOUNT_ID }}
          OTICA2_AD_ACCOUNT_ID: ${{ secrets.OTICA2_AD_ACCOUNT_ID }}
          ACTION_MODE: notify
          AUTO_PAUSE_ENABLED: 'false'
